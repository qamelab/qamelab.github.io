name: Fetch social feed

on:
  schedule:
    # Every 6 hours, offset by 17 minutes to avoid the top-of-hour stampede
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-social
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch posts
        run: node scripts/fetch-social.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet src/content/news; then
            echo "No changes."
            exit 0
          fi
          git config user.name "qame-news-bot"
          git config user.email "qame-news-bot@users.noreply.github.com"
          git add src/content/news
          git commit -m "chore(news): refresh social feed"
          git push
